<!DOCTYPE html>
<html>
<head>
    <title>SDR Radio Cobo - Redireccionando</title>
    <script>
        async function redirigir() {
            try {
                // Le preguntamos a Google que link tiene DuckDNS guardado
                const res = await fetch('https://dns.google/resolve?name=sdrcobo.duckdns.org&type=TXT');
                const data = await res.json();
                const url = data.Answer[0].data.replace(/"/g, "");
                
                if (url.startsWith('https')) {
                    window.location.href = url;
                } else {
                    document.body.innerHTML = "<h1>Error: El link en DuckDNS no es valido.</h1>";
                }
            } catch (e) {
                document.body.innerHTML = "<h1>Buscando la señal de la radio...</h1>";
                setTimeout(redirigir, 3000);
            }
        }
        window.onload = redirigir;
    </script>
</head>
<body style="background:#000; color:#fff; text-align:center; padding-top:20%; font-family:sans-serif;">
    <h1>Conectando con Radio Cobo...</h1>
    <p>Por favor espera un segundo.</p>
</body>
</html>
